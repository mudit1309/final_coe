[build]
  command = "npm run install:all && npm run build"
  publish = "client/dist"
  functions = "netlify/functions"

[build.environment]
  NETLIFY = "true"
  NODE_VERSION = "20"

# Redirect all /api/* requests to the serverless function
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/api/:splat"
  status = 200
  force = true

# SPA fallback — all other routes serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
